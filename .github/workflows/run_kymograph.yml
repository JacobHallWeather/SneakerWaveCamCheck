name: Run Kymograph Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-kymograph:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Skip when R2 credentials are unavailable
        if: ${{ secrets.R2_ACCOUNT_ID == '' || secrets.R2_ACCESS_KEY_ID == '' || secrets.R2_SECRET_ACCESS_KEY == '' }}
        run: echo "Skipping daily kymograph run because required R2 credentials are not configured."

      - name: Run kymograph for yesterday
        if: ${{ secrets.R2_ACCOUNT_ID != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          YESTERDAY=$(date -u -d 'yesterday' +%m-%d-%Y)
          ARGS=()
          if [ -n "${{ secrets.R2_BUCKET }}" ]; then
            ARGS+=(--bucket "${{ secrets.R2_BUCKET }}")
          fi
          if [ -n "${{ secrets.R2_PATH_PREFIX }}" ]; then
            ARGS+=(--prefix-root "${{ secrets.R2_PATH_PREFIX }}")
          fi
          if [ ${#ARGS[@]} -gt 0 ]; then
            python run_kymograph.py "$YESTERDAY" "${ARGS[@]}"
          else
            python run_kymograph.py "$YESTERDAY"
          fi

      - name: Commit updated kymographs
        if: ${{ secrets.R2_ACCOUNT_ID != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' }}
        run: |
          if git status --short -- KymoDay | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add KymoDay
            git commit -m "Update daily kymographs"
            git push origin HEAD:main
          else
            echo "No kymograph updates to commit."
          fi