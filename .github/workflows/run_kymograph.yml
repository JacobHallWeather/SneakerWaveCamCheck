name: Run Kymograph Daily

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-kymograph:
    runs-on: ubuntu-latest
    env:
      HAS_R2_CREDENTIALS: ${{ secrets.R2_ACCOUNT_ID != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run kymograph for yesterday
        if: env.HAS_R2_CREDENTIALS == 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PATH_PREFIX: ${{ secrets.R2_PATH_PREFIX }}
        run: |
          YESTERDAY=$(date -u -d 'yesterday' +%m-%d-%Y)
          python run_kymograph.py "$YESTERDAY"

      - name: Commit updated kymographs
        if: env.HAS_R2_CREDENTIALS == 'true'
        run: |
          if git status --short -- KymoDay | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add KymoDay
            git commit -m "Update daily kymographs"
            git push origin HEAD:main
          else
            echo "No kymograph updates to commit."
          fi